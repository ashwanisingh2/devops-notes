# Standard Ansible Static Inventory File

[webservers]
192.168.1.10
192.168.1.11

[dbservers]
192.168.1.20

# Grouping groups together
[production:children]
webservers
dbservers

# Setting variables for a specific group
[webservers:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/web-key.pem

[dbservers:vars]
ansible_user=admin
