---
- name: Connection Check and Server Facts Playbook
  hosts: all
  gather_facts: yes
  
  tasks:
    - name: Ping all servers to verify connectivity
      ansible.builtin.ping:

    - name: Display the OS distribution and version
      ansible.builtin.debug:
        msg: "This server is running {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Ensure 'devops' user exists (Idempotency test)
      ansible.builtin.user:
        name: devops
        state: present
        shell: /bin/bash
